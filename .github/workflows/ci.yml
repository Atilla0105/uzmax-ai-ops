name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 20
      - run: npm ci
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run depcruise
      - run: npm run guard:forbidden-terms
      - run: npm run guard:eval-triggers
      - run:
          npm run guard:pr-shape -- --base origin/main --spec
          docs/specs/M0-01-monorepo-ci-agents.md
      - run: npm run test
      - run: npm run size
      - run: npx playwright install --with-deps chromium
      - run: npm run playwright
