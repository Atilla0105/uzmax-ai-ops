name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full:
        description: Run full CI including external spikes and Playwright
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve guard diff base
        id: guard-base
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            before="${{ github.event.before }}"
            if [ -n "$before" ] && ! printf '%s' "$before" | grep -Eq '^0+$'; then
              echo "base=$before" >> "$GITHUB_OUTPUT"
            else
              echo "base=HEAD^" >> "$GITHUB_OUTPUT"
            fi
          fi
      - name: Classify changed paths
        id: path-scope
        shell: bash
        run: |
          set -euo pipefail

          base="${{ steps.guard-base.outputs.base }}"
          if git rev-parse --verify "$base" >/dev/null 2>&1; then
            changed_files="$(git diff --name-only "$base" HEAD)"
          else
            changed_files="$(git diff --name-only HEAD^ HEAD)"
          fi

          docs_only=true
          frontend_changed=false
          redis_smoke_changed=false
          spike_changed=false
          true_db_smoke_changed=false
          m5r_true_db_closeout_changed=false

          if [ -z "$changed_files" ]; then
            docs_only=false
          fi

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            case "$file" in
              docs/*|docs/**|README.md|SECURITY.md)
                ;;
              *)
                docs_only=false
                ;;
            esac

            case "$file" in
              apps/admin/*|apps/admin/**|packages/ui-tokens/*|packages/ui-tokens/**|playwright.config.ts)
                frontend_changed=true
                ;;
            esac

            case "$file" in
              .github/workflows/ci.yml|apps/worker/*|apps/worker/**|docs/evidence/M4/M4-45-order-import-queue-security-closeout.md|docs/evidence/M4/README.md|docs/specs/M4-45-order-import-queue-security-closeout.md|scripts/tests/m4-worker-test-loader.mjs|scripts/tests/m4-order-import-bullmq-redis-runtime.test.mjs|package.json|package-lock.json)
                redis_smoke_changed=true
                ;;
            esac

            case "$file" in
              packages/db/migrations/*|packages/db/migrations/**|packages/db/prisma/*|packages/db/prisma/**|packages/db/src/*|packages/db/src/**|packages/db/scripts/run-rls-prisma-pool-spike.mjs|packages/db/package.json|packages/authz/*|packages/authz/**|package.json|package-lock.json)
                spike_changed=true
                ;;
            esac

            case "$file" in
              apps/api/*|apps/api/**|apps/worker/*|apps/worker/**|packages/db/*|packages/db/**|scripts/tests/m4-order-import-*|scripts/tests/m4-customer-asset-*|package.json|package-lock.json)
                true_db_smoke_changed=true
                ;;
            esac

            case "$file" in
              .github/workflows/ci.yml|scripts/tests/m5r-true-integration-closeout.test.mjs|docs/specs/M5R-08-true-integration-closeout.md|docs/specs/M5R-08-true-db-ci-closeout.md|docs/evidence/M5R/M5R-08-true-integration-closeout.md|docs/evidence/M5R/README.md|docs/evidence/M5/README.md)
                m5r_true_db_closeout_changed=true
                ;;
            esac
          done <<< "$changed_files"

          force_full="${{ github.event_name == 'workflow_dispatch' && inputs.full }}"
          run_core=false
          run_redis_smoke=false
          run_spikes=false
          run_playwright=false
          run_true_db_smoke=false
          run_m5r_true_db_closeout=false

          if [ "$docs_only" != "true" ] || [ "$force_full" = "true" ]; then
            run_core=true
          fi
          if [ "$redis_smoke_changed" = "true" ] || [ "$force_full" = "true" ]; then
            run_redis_smoke=true
          fi
          if [ "$spike_changed" = "true" ] || [ "$force_full" = "true" ]; then
            run_spikes=true
          fi
          if [ "$frontend_changed" = "true" ] || [ "$force_full" = "true" ]; then
            run_playwright=true
          fi
          if [ "$true_db_smoke_changed" = "true" ] || [ "$force_full" = "true" ]; then
            run_true_db_smoke=true
          fi
          if [ "$m5r_true_db_closeout_changed" = "true" ] || [ "$force_full" = "true" ]; then
            run_m5r_true_db_closeout=true
          fi

          {
            echo "docs_only=$docs_only"
            echo "frontend_changed=$frontend_changed"
            echo "redis_smoke_changed=$redis_smoke_changed"
            echo "spike_changed=$spike_changed"
            echo "true_db_smoke_changed=$true_db_smoke_changed"
            echo "m5r_true_db_closeout_changed=$m5r_true_db_closeout_changed"
            echo "run_core=$run_core"
            echo "run_redis_smoke=$run_redis_smoke"
            echo "run_spikes=$run_spikes"
            echo "run_playwright=$run_playwright"
            echo "run_true_db_smoke=$run_true_db_smoke"
            echo "run_m5r_true_db_closeout=$run_m5r_true_db_closeout"
            echo "changed_files<<EOF"
            printf '%s\n' "$changed_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Report CI path scope
        shell: bash
        env:
          UZMAX_CI_CHANGED_FILES: ${{ steps.path-scope.outputs.changed_files }}
        run: |
          echo "docs_only=${{ steps.path-scope.outputs.docs_only }}"
          echo "frontend_changed=${{ steps.path-scope.outputs.frontend_changed }}"
          echo "redis_smoke_changed=${{ steps.path-scope.outputs.redis_smoke_changed }}"
          echo "spike_changed=${{ steps.path-scope.outputs.spike_changed }}"
          echo "true_db_smoke_changed=${{ steps.path-scope.outputs.true_db_smoke_changed }}"
          echo "m5r_true_db_closeout_changed=${{ steps.path-scope.outputs.m5r_true_db_closeout_changed }}"
          echo "run_core=${{ steps.path-scope.outputs.run_core }}"
          echo "run_redis_smoke=${{ steps.path-scope.outputs.run_redis_smoke }}"
          echo "run_spikes=${{ steps.path-scope.outputs.run_spikes }}"
          echo "run_playwright=${{ steps.path-scope.outputs.run_playwright }}"
          echo "run_true_db_smoke=${{ steps.path-scope.outputs.run_true_db_smoke }}"
          echo "run_m5r_true_db_closeout=${{ steps.path-scope.outputs.run_m5r_true_db_closeout }}"
          echo "changed_files:"
          printf '%s\n' "$UZMAX_CI_CHANGED_FILES"
      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 20
      - run: npm ci
      - if: steps.path-scope.outputs.run_redis_smoke == 'true'
        name: Start M4 BullMQ Redis smoke container
        run: |
          docker run -d --name uzmax-m4-45-redis -p 6379:6379 redis:7-alpine
          for attempt in $(seq 1 30); do
            if docker exec uzmax-m4-45-redis redis-cli ping | grep -q PONG; then
              exit 0
            fi
            sleep 1
          done
          docker logs uzmax-m4-45-redis
          exit 1
      - if: steps.path-scope.outputs.run_redis_smoke == 'true'
        name: M4 order import BullMQ Redis smoke
        env:
          UZMAX_REDIS_URL: redis://127.0.0.1:6379
        run: node apps/worker/scripts/run-m4-order-import-bullmq-redis-smoke.mjs
      - if: always() && steps.path-scope.outputs.run_redis_smoke == 'true'
        name: Stop M4 BullMQ Redis smoke container
        run: docker rm -f uzmax-m4-45-redis
      - run: npm run format:check
      - run:
          npm run guard:prettier-ignore -- --base "${{ steps.guard-base.outputs.base }}"
      - if: steps.path-scope.outputs.run_core == 'true'
        run: npm run typecheck
      - if: steps.path-scope.outputs.run_core == 'true'
        run: npm run lint
      - if: steps.path-scope.outputs.run_core == 'true'
        run: npm run depcruise
      - if: steps.path-scope.outputs.run_core == 'true'
        run: npm run jscpd
      - if: steps.path-scope.outputs.run_core == 'true'
        run: npm run knip
      - if: steps.path-scope.outputs.run_core == 'true'
        run: npm run guard:forbidden-terms
      - run:
          npm run guard:eval-triggers -- --base "${{ steps.guard-base.outputs.base }}"
      - run: npm run guard:doc-triggers
      - run: npm run guard:workspace
      - if: github.event_name == 'pull_request'
        run: npm run guard:pr-shape -- --base "${{ steps.guard-base.outputs.base }}"
      - if:
          steps.path-scope.outputs.run_core == 'true' ||
          steps.path-scope.outputs.run_true_db_smoke == 'true' ||
          steps.path-scope.outputs.run_m5r_true_db_closeout == 'true'
        run: npm run -w @uzmax/db prisma:generate
      - if: steps.path-scope.outputs.run_true_db_smoke == 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.path-scope.outputs.run_true_db_smoke == 'true'
        name: M4 order import true DB runtime smokes
        env:
          UZMAX_RLS_DATABASE_URL: >-
            ${{ secrets.UZMAX_RLS_DATABASE_URL }}&connection_limit=4&pool_timeout=60
          UZMAX_SUPABASE_SECRET_KEY: ${{ secrets.UZMAX_SUPABASE_SECRET_KEY }}
          UZMAX_SUPABASE_URL: https://enyocaykcgcfcswycujg.supabase.co
        run: |
          node packages/db/scripts/run-m4-order-import-true-db-smoke.mjs
          node packages/db/scripts/run-m4-order-import-api-true-db-http-smoke.mjs
          node packages/db/scripts/run-m4-order-import-admin-true-db-http-smoke.mjs
          node packages/db/scripts/run-m4-order-import-admin-visible-true-db-smoke.mjs
          node packages/db/scripts/run-m4-order-import-admin-visible-stale-missing-true-db-smoke.mjs
          node packages/db/scripts/run-m4-order-import-admin-submit-true-db-worker-dispatch-smoke.mjs
          node packages/db/scripts/run-m4-order-import-storage-backed-true-db-smoke.mjs
          node packages/db/scripts/run-m4-order-import-operator-workflow-smoke.mjs
          node packages/db/scripts/run-m4-customer-asset-runtime-workflow-smoke.mjs
      - if: steps.path-scope.outputs.run_m5r_true_db_closeout == 'true'
        name: Apply M5R dev smoke migrations
        env:
          UZMAX_RLS_DATABASE_URL_BASE: ${{ secrets.UZMAX_RLS_DATABASE_URL }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${UZMAX_RLS_DATABASE_URL_BASE:-}" ]; then
            echo "UZMAX_RLS_DATABASE_URL secret is required"
            exit 1
          fi
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi
          migration_url="$(node -e 'const url = new URL(process.env.UZMAX_RLS_DATABASE_URL_BASE); for (const key of ["pgbouncer", "connection_limit", "pool_timeout"]) url.searchParams.delete(key); process.stdout.write(url.toString());')"
          psql "${migration_url}" -v ON_ERROR_STOP=1 -f packages/db/migrations/0007_m5_operations_contracts_foundation.sql
          psql "${migration_url}" -v ON_ERROR_STOP=1 -f packages/db/migrations/0008_m5r05_logs_analytics_runtime.sql
      - if: steps.path-scope.outputs.run_m5r_true_db_closeout == 'true'
        name: M5R true integration closeout
        env:
          UZMAX_RLS_DATABASE_URL_BASE: ${{ secrets.UZMAX_RLS_DATABASE_URL }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${UZMAX_RLS_DATABASE_URL_BASE:-}" ]; then
            echo "UZMAX_RLS_DATABASE_URL secret is required"
            exit 1
          fi
          export UZMAX_RLS_DATABASE_URL="${UZMAX_RLS_DATABASE_URL_BASE}&connection_limit=4&pool_timeout=60"
          node --test scripts/tests/m5r-true-integration-closeout.test.mjs
      - if: steps.path-scope.outputs.run_spikes == 'true'
        name: SPK-03 RLS Prisma pool spike
        env:
          UZMAX_RLS_DATABASE_URL: >-
            ${{ secrets.UZMAX_RLS_DATABASE_URL }}&connection_limit=16&pool_timeout=60
          UZMAX_RLS_SET_ROLE: uzmax_spk03_ci
          UZMAX_RLS_SPIKE_CONCURRENCY: "16"
        run: npm run -w @uzmax/db spike:rls-prisma-pool
      - if: steps.path-scope.outputs.run_spikes == 'true'
        name: SPK-04 dual-auth chain spike
        env:
          UZMAX_RLS_DATABASE_URL: >-
            ${{ secrets.UZMAX_RLS_DATABASE_URL }}&connection_limit=16&pool_timeout=60
          UZMAX_RLS_SET_ROLE: uzmax_spk04_ci
          UZMAX_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.UZMAX_SUPABASE_PUBLISHABLE_KEY }}
          UZMAX_SUPABASE_SECRET_KEY: ${{ secrets.UZMAX_SUPABASE_SECRET_KEY }}
          UZMAX_SUPABASE_URL: https://enyocaykcgcfcswycujg.supabase.co
        run: npm run -w @uzmax/authz spike:dual-auth
      - if: steps.path-scope.outputs.run_core == 'true'
        run: npm run test
      - if: steps.path-scope.outputs.run_core == 'true'
        run: npm run build
      - if: steps.path-scope.outputs.run_playwright == 'true'
        run: npm run size
      - if: steps.path-scope.outputs.run_playwright == 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.path-scope.outputs.run_playwright == 'true'
        run: npm run playwright
