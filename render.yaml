services:
  - type: web
    runtime: node
    name: uzmax-api
    branch: main
    region: oregon
    plan: starter
    autoDeployTrigger: "off"
    buildCommand:
      npm ci --include=dev && npm run -w @uzmax/db prisma:generate && npm run build:api
    startCommand: npm --workspace @uzmax/api run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_WEBHOOK_SECRET
        sync: false
      - key: UZMAX_REDIS_URL
        fromService: { name: uzmax-redis, type: keyvalue, property: connectionString }
      - key: UZMAX_TELEGRAM_BOT_CHANNEL_CONNECTION_ID
        value: 33333333-3333-4333-8333-333333333604
      - key: UZMAX_TELEGRAM_BOT_INGRESS_QUEUE_MODE
        value: bullmq
      - key: UZMAX_TELEGRAM_BOT_ORG_ID
        value: 11111111-1111-4111-8111-111111111604
      - key: UZMAX_TELEGRAM_BOT_TENANT_ID
        value: 22222222-2222-4222-8222-222222222604
      - key: UZMAX_CONVERSATION_TICKET_REPOSITORY_MODE
        value: rls_prisma_gateway
      - key: UZMAX_RLS_DATABASE_URL
        sync: false
      - key: UZMAX_API_CORS_ORIGINS
        value: https://uzmax-admin.vercel.app,https://uzmax-admin-muxukk222-7795s-projects.vercel.app,https://uzmax-admin-atilla0105-muxukk222-7795s-projects.vercel.app,http://localhost:4173,http://127.0.0.1:4173

  - type: worker
    runtime: node
    name: uzmax-worker
    branch: main
    region: oregon
    plan: starter
    autoDeployTrigger: "off"
    buildCommand:
      npm ci --include=dev && npm run -w @uzmax/db prisma:generate && npm run
      build:worker
    startCommand: npm --workspace @uzmax/worker run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: UZMAX_REDIS_URL
        fromService: { name: uzmax-redis, type: keyvalue, property: connectionString }
      - key: UZMAX_WORKER_QUEUES
        value: telegram-bot-conversation
      - key: UZMAX_RLS_DATABASE_URL
        sync: false
      - key: UZMAX_WORKER_TELEGRAM_BOT_PERSISTENCE_MODE
        value: rls_prisma_gateway
      - key: UZMAX_WORKER_TELEGRAM_BOT_ANSWER_MODE
        value: live
      - key: UZMAX_WORKER_TELEGRAM_BOT_LLM_PROVIDER
        value: deepseek
      - key: UZMAX_WORKER_DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: UZMAXADMIN_DEEPSEEK_KEY
        sync: false
      - key: UZMAX_WORKER_TELEGRAM_BOT_AI_MEMBER_KEY
        value: support_bot
      - key: UZMAX_WORKER_TELEGRAM_BOT_KB_ENTRY_KEY
        value: setup
      - key: UZMAX_WORKER_TELEGRAM_BOT_LOCALE
        value: en
      - key: UZMAX_WORKER_TELEGRAM_BOT_REQUIRED_CAPABILITY_KEY
        value: TUTORIAL
      - key: UZMAX_TELEGRAM_BOT_TOKEN
        sync: false

  - type: cron
    runtime: node
    name: uzmax-cron
    branch: main
    region: oregon
    plan: starter
    autoDeployTrigger: "off"
    schedule: "*/15 * * * *"
    buildCommand:
      npm ci --include=dev && npm run -w @uzmax/db prisma:generate && npm run build:cron
    startCommand: npm --workspace @uzmax/cron run start
    envVars:
      - key: NODE_ENV
        value: production

  - type: keyvalue
    name: uzmax-redis
    region: oregon
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction
